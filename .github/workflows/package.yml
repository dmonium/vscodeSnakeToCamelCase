name: Compilar Extensión VS Code

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite activar la compilación manualmente desde la web

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        # Esto obliga a GitHub a ejecutar todos los comandos dentro de tu carpeta de la extensión
        working-directory: vscodeSnakeToCamelCase

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: vscodeSnakeToCamelCase/package-lock.json

    - name: Instalar dependencias
      run: npm install

    - name: Compilar código
      run: npm run vscode:prepublish --if-present

    - name: Instalar VSCE y empaquetar (.vsix)
      run: npx @vscode/vsce package --no-dependencies

    - name: Guardar el instalador .vsix como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: extension-vsix
        path: vscodeSnakeToCamelCase/*.vsix
