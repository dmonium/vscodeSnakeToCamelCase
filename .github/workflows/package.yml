name: Compilar Extensión VS Code

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Instalar dependencias
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    - name: Compilar código
      run: npm run vscode:prepublish --if-present

    - name: Instalar VSCE y empaquetar (.vsix)
      run: npx @vscode/vsce package --no-dependencies

    - name: Guardar el instalador .vsix como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: extension-vsix
        path: "*.vsix" # Ahora busca el archivo directamente en la raíz
